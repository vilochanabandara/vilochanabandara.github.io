<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ '/' | relative_url }}" class="logo">VB.</a>
            <ul class="nav-links">
                <li><a href="{{ '/#about' | relative_url }}">About</a></li>
                <li><a href="{{ '/#experience' | relative_url }}">Experience</a></li>
                <li><a href="{{ '/#projects' | relative_url }}">Projects</a></li>
                <li><a href="{{ '/#skills' | relative_url }}">Skills</a></li>
                <li><a href="{{ '/blog.html' | relative_url }}">Blog</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    {{ content }}

    <!-- Footer & Contact -->
    <footer id="contact">
        <div class="footer-container reveal">
            <h2>Get In <span class="highlight">Touch</span></h2>
            <p>I'm currently seeking roles in Cloud, DevOps, or Systems Engineering.</p>
            <div class="contact-methods">
                <a href="mailto:vilochanabandara@gmail.com" class="contact-item">
                    <i class="fas fa-envelope"></i> vilochanabandara@gmail.com
                </a>
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i> Kaduwela, Sri Lanka
                </div>
            </div>

            <div class="copyright">
                <p>&copy; 2026 Vilochana Bandara. Designed with technical excellence.</p>
            </div>
        </div>
    </footer>

    <!-- Custom JavaScript -->
    <script src="{{ '/script.js' | relative_url }}"></script>
</body>
</html>
