---
layout: default
---
<section class="blog-post" style="padding-top: 8rem; max-width: 800px; margin: 0 auto; min-height: 80vh;">
    <div class="glass-card">
        <h1 class="highlight" style="font-size: 2.5rem; margin-bottom: 0.5rem;">{{ page.title }}</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">{{ page.date | date: "%B %d, %Y" }}</p>
        
        <div class="post-content" style="font-size: 1.1rem; line-height: 1.8;">
            {{ content }}
        </div>
        
        <div style="margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem;">
            <a href="{{ '/blog.html' | relative_url }}" class="btn outline-btn"><i class="fas fa-arrow-left"></i> Back to Blog</a>
        </div>
    </div>
</section>

<style>
/* Basic markdown styling for posts */
.post-content h2, .post-content h3 {
    margin-top: 2rem;
    margin-bottom: 1rem;
    color: var(--accent);
}
.post-content p {
    margin-bottom: 1.5rem;
}
.post-content ul, .post-content ol {
    margin-bottom: 1.5rem;
    padding-left: 2rem;
}
.post-content li {
    margin-bottom: 0.5rem;
}
.post-content pre {
    background: rgba(0,0,0,0.5);
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    margin-bottom: 1.5rem;
}
.post-content code {
    background: rgba(0,0,0,0.5);
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    color: #e2e8f0;
}
.post-content pre code {
    background: transparent;
    padding: 0;
}
.post-content blockquote {
    border-left: 4px solid var(--accent);
    padding-left: 1rem;
    margin-left: 0;
    color: var(--text-muted);
    font-style: italic;
}
</style>
